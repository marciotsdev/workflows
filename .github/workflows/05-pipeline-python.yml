name: 05 - Pipeline Python completo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install flake8 black
      - run: black --check .
      - run: flake8 . --max-line-length=120

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]   # testa em paralelo em 2 versões

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install pytest pytest-cov
      - run: pytest --cov=. --cov-report=xml

      - name: Salvar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem
        run: docker build -t minha-api:${{ github.sha }} .

      - name: Smoke test da imagem
        run: docker run --rm minha-api:${{ github.sha }} python --version

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - run: echo "Deploy da imagem minha-api:${{ github.sha }} em producao!"
